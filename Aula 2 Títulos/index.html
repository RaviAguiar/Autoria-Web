<!DOCTYPE html>
<!-- marcação de doctype define a versão do html que é HTML 5 -->
<html lang="pt-br">
    <!-- MARCAÇÃO DE HTML É A RAIZ DO MODELO DE OBJETO DE DOCUMENTO
    só tem 2 tags dentro: head, body
    dentro da marcação html o atributo lang 
    -->
    <head>
        <!-- marcação head: recebe configurações da página
         - nome do desenvolvedor
         - palavras-chave
         - descrição do site
         - tablulação de acertos...
          -->
        <title>Títulos</title>
        <!-- Isso aq faz aparecer na aba do site -->
        <meta name="utf-8">
        <!-- o meta de utf-8 regula a acentuação -->
         <meta name="Keywords" content="ifrn, cnat, diatinf, infoweb">
         <!-- meta de palavras-chave ajuda na indexação dos robos de busca -->
          <meta name="description" content="descrição do site"...>
         <meta name="author" content="Seu nome">
        <!-- A marcação de meta não tem marcação de fechamento -->
    </head>
    <body>
        <!-- todas as marcações e seus conteúdos ficarão visíveis -->
        <h1>Títulos de nível 1</h1>
        <h2>Títulos de nível 2</h2>
        <h3>Títulos de nível 3</h3>
        <h4>Títulos de nível 4</h4>
        <h5>Títulos de nível 5</h5>
        <h6>Títulos de nível 6</h6>
        <p>Texto qualquer para fazer volume... blablablaaa..</p>

        <hr>
        <!-- hr=horizontal rule - linha horizontal:
         SEMÂNTICA: separa blocos de informações por assuntos
          -->
         <h1>IFRN</h1>
         <h2>Cursos</h2>
         <h3>Informática para internet</h3>
    </body>
</html>
