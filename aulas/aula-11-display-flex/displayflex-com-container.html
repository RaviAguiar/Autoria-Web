<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAY FLEX</title>
    <style>
        #container{
            border: 1px solid blue;
            max-width: 70rem;
            margin: 0 auto

            display: flex;
            flex-wrap: wrap;
            /* DIAGRAMAÇÃO */
            /* 
            para usar o display flex é necesário aplicar no container!!
            - ao aplicar o display flex no container, todas as marcações ficarão
            uma ao lado da outra
            - similar ao display: 'inline-block', as marcações ficarão uma ao lado da outra,
            só que no display-flex teremos MUITO MAIS configurações...
            */
        }
        div{
            border: 1px solid black;
            width: 20rem;
            margin: 2rem;
            padding: 2rem;
        }
        div.a{ order: 3;}
        div.b{ order: 5;}
        div.c{ order: 2;}
        div.d{ order: 4;}
        div.e{ order: 1;}
    </style>
</head>
<body>
    <div id="container">
    <div class="a">
        <p>1</p>
    </div>
    <div class="b">
        <p>2</p>
    </div>
    <div class="c">
        <p>3</p>
    </div>
    <div class="d">
        <p>4</p>
    </div>
    <div class="e">
        <p>5</p>
    </div>
</div>

</body>
</html>
