<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOWEB NA COPA</title>
</head>
<body>
    <!-- 
    MARCAÇÕES DE SEÇÕES:
    - header - cabeçalho
    - nav - menu de navegação
    - main - área principal (conteúdo sem cabeçalho e rodapé)
    - section - área da seção da página
    - footer - rodapé
    * NÃO TEM FORMATAÇÃO PADRÃO
    * AS UTILIZAÇÕES DESSAS MARCAÇÕES SÃO PARA ORGANIZAÇÃO DO CÓDIGO!!!
    -->
    <header>
        <!-- 
        Marcação de header: delimita cabeçalho
        - pode ter mais de uma página
        - no cabeçalho de uma página, pode ter:
        marca, menu de usuário, busca, menu de redes sociais, etc.
        -->
        <h1>INFOWEB NA COPA</h1>
        <nav>
            <!-- 
            Marcação de nav: delimita a navegação da página
            uma página pode ter vários menus: (exemplos)
                - menu principal
                - menu local (de uma categoria específica)
                - menu de usuário: favoritos, carrinho, login...
                - menu de acessibilidade
                - menu insticucional: pagamentos, política de trocas...
            -->
            <ol>
                <li><a href="">FIGURINHAS</a></li>
                <li><a href="">AGENDA</a></li>
                <li><a href="">ORGANIZADORES</a></li>
                <li><a href="">CONTATOS</a></li>
            </ol>
        </nav>
    </header>
    <main>
        <!-- main: delimita a área principal sem cabeçalho e rodapé 
        SO PODE TER UMA MARCAÇÃO DE MAIN NO ARQUIVO!!!
        -->
         <section>
            <!-- marcação de section representa uma seção de conteúdo
                - precisa ter um título
                - pode ter várias seções em uma página
                - a marcação de seção pode estar dentro do header, do footer... 
            -->
            <h2>TROCA DE FIGURINHAS</h2>
            <h3>Regras:</h3>
            <ul>
                <li>Figurinhas do Brasil vale 2</li>
                <li>Não aceitamos rasgadas</li>
                <li>Figurinha da coca só troca com as da coca</li>
                <li>Figurinha brilhosa vale 2</li>
            </ul>
         </section>
    </main>
    <footer>
        <!-- MARCAÇÃO DE FOOTER: representa o rodapé
        geralmente tem:
        - menu principal (novamente)
        - contato
        - endereço
        - menu redes sociais, institucionais
        - marca
        - desenvolvimento
        - direitos reservados...
        -->
        <p>Desenvolvido por IFRN/CNAT/DIATINF/INFOWEB</p>
    </footer>
</body>
</html>
